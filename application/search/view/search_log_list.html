<script type="text/javascript">
	var start = {elem:'#start',format:'YYYY-MM-DD hh:mm:ss',min:'1999-01-01',max:'2099-01-01',istime:true,istoday:false,choose:function(datas){end.min = datas;end.start = datas}

	var end = {elem:'#end',format:'YYYY-MM-DD hh:mm:ss',min:'1999-01-01',max:'2099-01-01',istime:true,istoday:false,choose:function(datas){start.max = datas;}};
	laydate(start);
	laydate(end);

    function del_count(){
        var count = $('#del_count').val();
        if(isNaN(count)){
            layer.msg('请输入数字', {icon: 2});
            return false;
        }
        if(count < 1){
            layer.msg('搜索次数不能小于1', {icon: 2});
            return false;
        }
        layer.confirm('确定删除搜索次数小于 '+count+' 的所有记录吗？', {title:"操作提示"}, function(index){
            layer.close(index);
            $.post('<?php echo U('del_count');?>', {count: count, yzm_csrf_token: yzm_csrf_token}, function(data){
                if(data.status == 1){
                    layer.msg(data.message, {icon: 1,time:2000}, function(){
                        window.location.reload();
                    });
                }else{
                    layer.msg(data.message, {icon: 2});
                }
            });
        });
    }
</script>
