<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>八卦管理 - 起名系统后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", Arial, sans-serif; background: #f5f5f5; }
        .page-title { padding: 20px 30px; background: #fff; margin-bottom: 20px; border-radius: 8px; }
        .page-title h2 { color: #333; }
        .content { padding: 0 20px 20px; }
        .table-box { background: #fff; border-radius: 8px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f9f9f9; color: #666; font-weight: 500; }
        tr:hover { background: #fafafa; }
        .gua-cell { font-size: 28px; color: #ff6600; font-weight: bold; text-align: center; }
        .gua-name { font-weight: 500; color: #333; }
        .actions a { color: #ff6600; margin-right: 10px; }
        .actions a.delete { color: #f44336; }
        .page { padding: 20px; text-align: center; }
        .page a { padding: 5px 12px; background: #f5f5f5; color: #666; border-radius: 4px; text-decoration: none; margin: 0 3px; }
        .page a:hover { background: #ff6600; color: #fff; }
        .page .current { background: #ff6600; color: #fff; }
    </style>
</head>
<body>
    <div class="page-title">
        <h2>八卦管理</h2>
    </div>
    <div class="content">
        <div class="table-box">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>卦象</th>
                        <th>卦名</th>
                        <th>五行</th>
                        <th>卦辞</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {foreach name="list" item="vo"}
                    <tr>
                        <td>{$vo.id}</td>
                        <td class="gua-cell">{$vo.gua_name}</td>
                        <td class="gua-name">{$vo.name}</td>
                        <td>{$vo.wuxing}</td>
                        <td>{$vo.guaci|substring:0,30}...</td>
                        <td class="actions">
                            <a href="{U('qiming/bagua_edit', array('id'=>$vo['id']))}">查看详情</a>
                        </td>
                    </tr>
                    {/foreach}
                </tbody>
            </table>
        </div>
        
        <div class="page">
            {$page}
        </div>
    </div>
</body>
</html>
