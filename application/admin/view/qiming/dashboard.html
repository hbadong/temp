* { box-sizing: border-box; }

.btn-secondary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }

table { width: 100%; border-collapse: collapse; margin-top: 15px; }
th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
th { background: #f9f9f9; font-weight: 600; color: #333; }
tr:hover { background: #fafafa; }
.badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
.badge-success { background: #e8f5e9; color: #4caf50; }
.badge-warning { background: #fff3e0; color: #ff9800; }

.recent-list .time { color: #999; font-size: 12px; }

@media (max-width: 768px) {
