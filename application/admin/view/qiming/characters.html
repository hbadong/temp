<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>汉字管理 - 起名系统后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", Arial, sans-serif; background: #f5f5f5; }
        .page-title { padding: 20px 30px; background: #fff; margin-bottom: 20px; border-radius: 8px; }
        .page-title h2 { color: #333; }
        .content { padding: 0 20px 20px; }
        .search-box { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .search-box input { padding: 8px 15px; border: 1px solid #ddd; border-radius: 4px; width: 200px; }
        .search-box button { padding: 8px 20px; background: #ff6600; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        .table-box { background: #fff; border-radius: 8px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f9f9f9; color: #666; font-weight: 500; }
        tr:hover { background: #fafafa; }
        .char-cell { font-size: 24px; color: #ff6600; font-weight: bold; }
        .wuxing-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; color: #fff; }
        .wuxing-jin { background: #ffc107; }
        .wuxing-mu { background: #4caf50; }
        .wuxing-shui { background: #2196f3; }
        .wuxing-huo { background: #f44336; }
        .wuxing-tu { background: #ff9800; }
        .actions a { color: #ff6600; margin-right: 10px; }
        .actions a.delete { color: #f44336; }
        .btn-add { display: inline-block; padding: 10px 20px; background: #ff6600; color: #fff; border-radius: 4px; text-decoration: none; }
        .page { padding: 20px; text-align: center; }
        .page a { padding: 5px 12px; background: #f5f5f5; color: #666; border-radius: 4px; text-decoration: none; margin: 0 3px; }
        .page a:hover { background: #ff6600; color: #fff; }
        .page .current { background: #ff6600; color: #fff; }
    </style>
</head>
<body>
    <div class="page-title">
        <h2>汉字管理</h2>
    </div>
    <div class="content">
        <div class="search-box">
            <form method="get" action="{U('qiming/characters')}" style="display: inline;">
                <input type="hidden" name="m" value="admin">
                <input type="hidden" name="c" value="qiming">
                <input type="text" name="search" value="{$search}" placeholder="搜索汉字或拼音...">
                <button type="submit">搜索</button>
            </form>
            <a href="{U('qiming/char_add')}" class="btn-add" style="float: right;">添加汉字</a>
        </div>
        
        <div class="table-box">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>汉字</th>
                        <th>拼音</th>
                        <th>注音</th>
                        <th>部首</th>
                        <th>笔画</th>
                        <th>五行</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {foreach name="list" item="vo"}
                    <tr>
                        <td>{$vo.id}</td>
                        <td class="char-cell">{$vo.char}</td>
                        <td>{$vo.pinyin}</td>
                        <td>{$vo.zhuyin}</td>
                        <td>{$vo.bushou}</td>
                        <td>{$vo.bihua}</td>
                        <td>
                            {switch name="$vo.wuxing"}
                            <case value="1"><span class="wuxing-badge wuxing-jin">金</span></case>
                            <case value="2"><span class="wuxing-badge wuxing-mu">木</span></case>
                            <case value="3"><span class="wuxing-badge wuxing-shui">水</span></case>
                            <case value="4"><span class="wuxing-badge wuxing-huo">火</span></case>
                            <case value="5"><span class="wuxing-badge wuxing-tu">土</span></case>
                            {/switch}
                        </td>
                        <td class="actions">
                            <a href="{U('qiming/char_edit', array('id'=>$vo['id']))}">编辑</a>
                            <a href="{U('qiming/char_del', array('id'=>$vo['id']))}" class="delete" onclick="return confirm('确定删除？')">删除</a>
                        </td>
                    </tr>
                    {/foreach}
                </tbody>
            </table>
        </div>
        
        <div class="page">
            {$page}
        </div>
    </div>
</body>
</html>
