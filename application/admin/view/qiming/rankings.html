<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>热门排行管理 - 起名系统后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", Arial, sans-serif; background: #f5f5f5; }
        .page-title { padding: 20px 30px; background: #fff; margin-bottom: 20px; border-radius: 8px; }
        .page-title h2 { color: #333; }
        .content { padding: 0 20px 20px; }
        .tabs { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; }
        .tab { padding: 10px 20px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; background: #fff; }
        .tab.active { background: #ff6600; color: #fff; border-color: #ff6600; }
        .table-box { background: #fff; border-radius: 8px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f9f9f9; color: #666; font-weight: 500; }
        tr:hover { background: #fafafa; }
        .rank-num { width: 30px; height: 30px; background: #ff6600; color: #fff; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; }
        .char-cell { font-size: 24px; color: #ff6600; font-weight: bold; }
        .actions a { color: #ff6600; margin-right: 10px; }
        .actions a.delete { color: #f44336; }
    </style>
</head>
<body>
    <div class="page-title">
        <h2>热门排行管理</h2>
    </div>
    <div class="content">
        <div class="tabs">
            <a href="{U('qiming/rankings', array('type'=>'boy-char'))}" class="tab {if $type eq 'boy-char'}active{/if}">男孩用字</a>
            <a href="{U('qiming/rankings', array('type'=>'girl-char'))}" class="tab {if $type eq 'girl-char'}active{/if}">女孩用字</a>
            <a href="{U('qiming/rankings', array('type'=>'boy-name'))}" class="tab {if $type eq 'boy-name'}active{/if}">男孩名字</a>
            <a href="{U('qiming/rankings', array('type'=>'girl-name'))}" class="tab {if $type eq 'girl-name'}active{/if}">女孩名字</a>
        </div>
        
        <div class="table-box">
            <table>
                <thead>
                    <tr>
                        <th>排行</th>
                        <th>汉字/名字</th>
                        <th>拼音</th>
                        <th>寓意/含义</th>
                        <th>月份</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {foreach name="list" item="vo"}
                    <tr>
                        <td><span class="rank-num">{$vo.ranking}</span></td>
                        <td class="char-cell">{$vo.char_or_name}</td>
                        <td>{$vo.pinyin}</td>
                        <td>{$vo.meaning}</td>
                        <td>{$vo.month}</td>
                        <td class="actions">
                            <a href="{U('qiming/rankings_edit', array('id'=>$vo['id']))}">编辑</a>
                            <a href="{U('qiming/rankings_del', array('id'=>$vo['id']))}" class="delete" onclick="return confirm('确定删除？')">删除</a>
                        </td>
                    </tr>
                    {/foreach}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
