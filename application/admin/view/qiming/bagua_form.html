<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>八卦详情 - 起名系统后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", Arial, sans-serif; background: #f5f5f5; }
        .page-title { padding: 20px 30px; background: #fff; margin-bottom: 20px; border-radius: 8px; }
        .page-title h2 { color: #333; }
        .form-box { background: #fff; padding: 30px; border-radius: 8px; }
        .gua-display { text-align: center; padding: 30px; background: #fafafa; border-radius: 8px; margin-bottom: 30px; }
        .gua-display .gua-symbol { font-size: 72px; color: #ff6600; font-weight: bold; }
        .gua-display .gua-name { font-size: 24px; color: #333; margin-top: 10px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #666; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 15px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .form-group textarea { height: 100px; resize: vertical; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #ff6600; }
        .btn-back { padding: 12px 30px; background: #999; color: #fff; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <div class="page-title">
        <h2>八卦详情</h2>
    </div>
    <div class="form-box">
        <div class="gua-display">
            <div class="gua-symbol">{$data.gua_name}</div>
            <div class="gua-name">{$data.name}卦</div>
        </div>
        
        <div class="form-group">
            <label>卦象符号</label>
            <input type="text" value="{$data.gua_name}" readonly>
        </div>
        
        <div class="form-group">
            <label>卦名</label>
            <input type="text" value="{$data.name}" readonly>
        </div>
        
        <div class="form-group">
            <label>五行</label>
            <input type="text" value="{$data.wuxing}" readonly>
        </div>
        
        <div class="form-group">
            <label>卦辞</label>
            <textarea readonly>{$data.guaci}</textarea>
        </div>
        
        <div class="form-group">
            <label>彖辞</label>
            <textarea readonly>{$data.tuanci}</textarea>
        </div>
        
        <div class="form-group">
            <label>象辞</label>
            <textarea readonly>{$data.xiangci}</textarea>
        </div>
        
        <div class="form-group">
            <a href="{U('qiming/bagua')}" class="btn-back">返回列表</a>
        </div>
    </div>
</body>
</html>
