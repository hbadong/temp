<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{$seo_title}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", Arial, sans-serif; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; padding: 0 15px; }
        .page-header { background: linear-gradient(135deg, #ff6600, #ff8533); color: #fff; padding: 40px 0; text-align: center; }
        .char-display { font-size: 72px; margin-bottom: 10px; }
        .pinyin { font-size: 24px; opacity: 0.9; }
        
        .main { padding: 40px 0; }
        .info-card { background: #fff; border-radius: 10px; padding: 30px; margin-bottom: 20px; }
        .info-title { font-size: 18px; color: #333; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #ff6600; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .info-item { text-align: center; padding: 15px; background: #f9f9f9; border-radius: 8px; }
        .info-item .label { color: #999; font-size: 14px; }
        .info-item .value { font-size: 20px; font-weight: bold; color: #ff6600; margin-top: 5px; }
        
        .meaning { line-height: 1.8; color: #666; }
        
        .btn-back { display: inline-block; padding: 12px 30px; background: #ff6600; color: #fff; border-radius: 5px; text-decoration: none; margin-top: 20px; }
        .btn-back:hover { background: #e55a00; }
    </style>
</head>
<body>
    <div class="page-header">
        <div class="container">
            <div class="char-display">{$data['char']}</div>
            <div class="pinyin">{php echo $data['pinyin'] . ' ' . $data['zhuyin'];}</div>
        </div>
    </div>
    
    <div class="container main">
        <div class="info-card">
            <h3 class="info-title">基本信息</h3>
            <div class="info-grid">
                <div class="info-item">
                    <div class="label">笔画</div>
                    <div class="value">{$data['bihua']}</div>
                </div>
                <div class="info-item">
                    <div class="label">五行</div>
                    <div class="value">{php echo $wuxing_names[$data['wuxing']];}</div>
                </div>
                <div class="info-item">
                    <div class="label">部首</div>
                    <div class="value">{$data['bushou']}</div>
                </div>
            </div>
        </div>
        
        {if !empty($data['jx'])}
        <div class="info-card">
            <h3 class="info-title">康熙字典解释</h3>
            <div class="meaning">{$data['jx']}</div>
        </div>
        {/if}
        
        {if !empty($data['xmxy'])}
        <div class="info-card">
            <h3 class="info-title">起名寓意</h3>
            <div class="meaning">{$data['xmxy']}</div>
        </div>
        {/if}
        
        <div style="text-align:center;">
            <a href="javascript:history.back();" class="btn-back">返回上一页</a>
        </div>
    </div>
</body>
</html>
