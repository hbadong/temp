<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{$seo_title}</title>
    <meta name="keywords" content="康熙字典,拼音{$letter}开头,汉字拼音,起名用字">
    <meta name="description" content="起名网康熙字典提供拼音{$letter}开头的汉字查询，包含汉字拼音、笔画、五行、解释等详细信息。">
    <link rel="stylesheet" href="https://static.qiming.cn/style/qiming/css/font/iconfont.css">
    <link rel="stylesheet" href="https://static.qiming.cn/style/qiming/css/uikit.css">
    <link rel="stylesheet" href="https://static.qiming.cn/style/qiming/css/diy.css">
    <link rel="stylesheet" href="https://static.qiming.cn/style/qiming/css/qiming.css">
    <script src="https://static.qiming.cn/style/qiming/js/jquery.min.js"></script>
    <script src="https://static.qiming.cn/style/qiming/js/uikit.min.js"></script>
    <style>
        .kxzd-header { background: linear-gradient(135deg, #ff6600, #ff8533); padding: 40px 0; text-align: center; color: #fff; }
        .kxzd-header h1 { font-size: 28px; margin-bottom: 10px; }
        .kxzd-header p { font-size: 14px; opacity: 0.9; }
        
        .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 15px; padding: 20px 0; }
        .char-item { display: flex; flex-direction: column; align-items: center; padding: 15px 10px; background: #f9f9f9; border-radius: 10px; text-decoration: none; transition: all 0.3s; }
        .char-item:hover { background: #ff6600; color: #fff; transform: translateY(-3px); }
        .char-item .char { font-size: 28px; font-weight: bold; margin-bottom: 5px; }
        .char-item .pinyin { font-size: 12px; color: #999; }
        .char-item:hover .pinyin { color: rgba(255,255,255,0.8); }
        
        .char-list { background: #fff; border-radius: 12px; padding: 20px; }
        .char-list-title { font-size: 18px; color: #333; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #ff6600; }
        .char-list-title i { margin-right: 8px; color: #ff6600; }
        
        .back-link { display: inline-block; padding: 10px 20px; background: #ff6600; color: #fff; border-radius: 6px; text-decoration: none; margin-bottom: 20px; }
        .back-link:hover { background: #ff8533; }
        
        .empty-tip { text-align: center; padding: 60px 20px; color: #999; }
        .empty-tip i { font-size: 48px; margin-bottom: 15px; }
    </style>
</head>
<body class="qiming-background-muted site">
    
    <header class="header qiming-background-default" id="header">
        <div class="navbar qiming-position-relative">
            <div class="qiming-container qiming-flex qiming-flex-middle qiming-position-relative qiming-logo-shou">
                <a href="{U('qiming/index/init')}" class="header-home" qiming-toggle><i class="iconfont icon-menu qiming-text-bolder"></i></a>
                <a href="{U('qiming/index/init')}" class="logo qiming-logo qiming-display-inline-block" alt="起名网">
                    <div class="qiming-logo-nav-night logobg qiming-visible@m"></div>
                    <div class="qiming-app-logo2 logobg2"></div>
                </a>
                <nav class="nav qiming-flex-1 qiming-position-relative">
                    <ul class="nav qiming-flex-1 qiming-margin-remove">
                        <li class="menu-item menu-item-type-custom menu-item-object-custom menu-item-home">
                            <a href="{U('qiming/index/init')}">首页</a>
                        </li>
                        <li class="menu-item menu-item-type-custom menu-item-object-custom menu-item-has-children">
                            <a href="{U('qiming/index/baobao')}">宝宝起名</a>
                        </li>
                        <li class="menu-item menu-item-type-custom menu-item-object-custom menu-item-has-children">
                            <a href="{U('qiming/index/bazi')}">八字起名</a>
                        </li>
                        <li class="menu-item menu-item-type-custom menu-item-object-custom menu-item-has-children">
                            <a href="{U('qiming/index/kxzd')}">康熙字典</a>
                        </li>
                        <li class="menu-item menu-item-type-custom menu-item-object-custom menu-item-has-children">
                            <a href="{U('qiming/index/baijiaxing')}">百家姓</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>
    
    <div class="kxzd-header">
        <h1>拼音{$letter}开头的汉字</h1>
        <p>共找到 {count($chars_list)} 个汉字</p>
    </div>
    
    <div class="qiming-container" style="padding: 30px 15px;">
        <a href="{U('qiming/index/kxzd')}" class="back-link"><i class="iconfont icon-arrow-left"></i> 返回康熙字典</a>
        
        <div class="char-list">
            <h2 class="char-list-title"><i class="iconfont icon-star"></i>汉字列表</h2>
            
            {if !empty($chars_list)}
            <div class="char-grid">
                {loop $chars_list $v}
                <a href="{U('qiming/index/kxzd')}?char={$v['char']}" class="char-item">
                    <span class="char">{$v['char']}</span>
                    <span class="pinyin">{$v['pinyin']}</span>
                </a>
                {/loop}
            </div>
            {else}
            <div class="empty-tip">
                <i class="iconfont icon-file-common"></i>
                <p>暂无数据</p>
            </div>
            {/if}
        </div>
    </div>
    
    <footer class="footer qiming-background-secondary">
        <div class="foot qiming-container qiming-padding">
            <div class="qiming-grid" qiming-grid>
                <div class="qiming-width-1-1@s qiming-width-1-3@xl">
                    <div class="foot-item foot-item-first qiming-position-relative qiming-flex">
                        <a href="{U('qiming/index/init')}" target="_blank" class="foot-logo qiming-display-block">
                            <img src="https://static.qiming.cn/style/qiming/images/logo_foot.png">
                        </a>
                        <p class="qiming-text-small">起名网专注科学智能宝宝起名，测名字打分平台。</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="foot-cop">
            <div class="qiming-container qiming-padding-small qiming-clearfix">
                <div class="qiming-float-left">
                    <span>&copy; 2005-2025 <a href="https://www.qiming.cn/" target="_blank">起名网</a> & All rights reserved</span>
                </div>
            </div>
        </div>
    </footer>
    
</body>
</html>
