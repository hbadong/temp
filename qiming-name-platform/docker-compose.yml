version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: qiming-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_NAME:-qiming_db}
      MYSQL_USER: ${DB_USER:-qiming}
      MYSQL_PASSWORD: ${DB_PASSWORD:-qiming123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/scripts/initDb.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - qiming-network

  redis:
    image: redis:6-alpine
    container_name: qiming-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - qiming-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qiming-backend
    restart: always
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-qiming}
      DB_PASSWORD: ${DB_PASSWORD:-qiming123}
      DB_NAME: ${DB_NAME:-qiming_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 8080
      NODE_ENV: production
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
    networks:
      - qiming-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qiming-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - qiming-network

volumes:
  mysql_data:
  redis_data:

networks:
  qiming-network:
    driver: bridge
